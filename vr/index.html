<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>VR Demo</title>
  <script src="https://aframe.io/releases/0.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-curve-component/dist/aframe-curve-component.min.js"></script>
  <script src="js/aframe-alongpath-component.min.js"></script>
</head>

<body>
  <a-scene>

    <a-assets>
      <img id="boxTexture" crossorigin="anonymous" src="https://i.imgur.com/mYmmbrp.jpg">
      <img id="groundTexture" crossorigin="anonymous" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      <img id="skyTexture" crossorigin="anonymous" src="https://cdn.aframe.io/a-painter/images/sky.jpg">
      <audio src="assets/music.mp3" crossorigin="anonymous" autoplay
      preload loop></audio>
      <a-asset-item id="city" crossorigin="anonymous" src="assets/city.obj"></a-asset-item>
      <a-asset-item id="city_texture" crossorigin="anonymous" src="assets/city.mtl"></a-asset-item>
    </a-assets>

    <a-entity id="city" obj-model="obj:#city;mtl:#city_texture" scale="0.050 0.050 0.050" position="0 0 -12.5" rotation="0 0 0" visible="true" material="">
    </a-entity>

    <a-curve id="blimp-track" type="CatmullRom" curve="closed:true" position="" rotation="" scale="" visible="">
    <a-curve-point id="checkpoint1" position="4.123 0.1 14.471" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint2" position="8.9 0.1 11.339" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint3" position="9.9 0.1 9.345" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint4" position="9.695 0.1 7.519" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint5" position="8.272 0.1 6" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint6" position="6.335 0.1 5.166" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint7" position="3.779 0.1 4.213" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint8" position="2.419 0.1 2.953" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint9" position="2.106 0.1 1.732" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint10" position="2.406 0.1 0.07" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint11" position="2.993 0.1 -1.046" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint12" position="5.678 0.1 -3.3" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint13" position="7.035 0.1 -4.375" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint14" position="8.422 0.1 -5.31" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint15" position="9.885 0.1 -6.056" rotation="" scale="" visible="" curve-point=""></a-curve-point>
    <a-curve-point id="checkpoint16" position="10.9 0.1 -7.11" rotation="" scale="" visible="" curve-point=""></a-curve-point>
  </a-curve>

  <a-draw-curve curveref="#blimp-track" material="shader: line; color: red;" position="" rotation="" scale="" visible="" draw-curve=""></a-draw-curve>

    <a-sky height="2048" radius="30" src="#skyTexture" theta-length="90" width="2048"></a-sky>
    
    <a-light type="ambient" intensity="0.8" position="-2.62 19 16"></a-light>

    <a-plane src="#groundTexture" rotation="-90 0 0" height="100" width="100"></a-plane>

    <a-camera rotation="0 -55 0" wasd-controls="acceleration:5" alongpath="curve:#blimp-track;dur:120000;triggerRadius:1;loop:false;delay:1500;">
      <!-- <a-cursor id="cursor" color="#fafafa"></a-cursor> -->
    </a-camera>

  </a-scene>
</body>

</html>
